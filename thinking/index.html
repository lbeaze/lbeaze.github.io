<head>

  <title>Thinking — Len Beasley</title>
  <meta name="description" content="Essays, observations, and ideas at the intersection of design, accessibility, and the future of building for humans." />
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="Len Beasley" />
  <meta property="og:title"       content="Thinking — Len Beasley" />

  <meta property="og:url"         content="https://lenbeasley.com/thinking/" />
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="Thinking — Len Beasley" />
  <meta name="twitter:description" content="Essays, observations, and ideas at the intersection of design, accessibility, and the future of building for humans." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #0f1623;
      --navy-mid:    #16202f;
      --navy-light:  #1e2d42;
      --warm-white:  #f2ede6;
      --accent:      #f07828;
      --accent-dim:  #d96820;
      --text-body:   #b8c4d0;
      --text-muted:  #8fa3b8;
      --text-bright: #dce6ef;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--navy);
      color: var(--text-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── SPOTLIGHT CURSOR ──────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(
        700px circle at var(--mouse-x, -400px) var(--mouse-y, -400px),
        rgba(240, 120, 40, 0.07),
        transparent 70%
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ── SKIP LINK ─────────────────────────────────────── */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 0.875rem;
      padding: 0.6rem 1.1rem;
      border-radius: 0 0 4px 4px;
      text-decoration: none;
      z-index: 999;
      transition: top 0.1s;
    }
    .skip-link:focus { top: 0; }

    /* ── LAYOUT ────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: 100vh;
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ── LEFT PANEL ────────────────────────────────────── */
    .left-panel {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      padding: 4rem 2.5rem 3rem;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--navy-light);
    }

    /* ── SITE NAV ─────────────────────────────────────── */
    .site-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid rgba(242,237,230,0.1);
    }
    .site-nav ul {
      display: flex;
      flex-wrap: wrap;
      gap: 0.2rem 1.1rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .site-nav-link {
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .site-nav-link:hover { color: var(--text-bright); }
    .site-nav-link[aria-current="page"] { color: var(--accent); }
    .site-nav-link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 2px;
    }
    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0.2rem;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      transition: color 0.2s;
      border-radius: 4px;
    }
    .theme-toggle:hover { color: var(--accent); }
    .theme-toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* ── LIGHT MODE ────────────────────────────────────── */
    [data-theme="light"] {
      --navy:        #f0ebe3;
      --panel-bg:    #e5dfd5;
      --card-bg:     rgba(255,255,255,0.65);
      --warm-white:  #1c1c2e;
      --text-bright: #0e131f;
      --text-main:   #2c2c3c;
      --text-body:   #3d3a4a;
      --text-muted:  #525065;
      --accent:      #9e4d0d;
      --accent-dim:  #7a3a09;
    }
    [data-theme="light"] body::before {
      background: radial-gradient(700px circle at var(--mouse-x,-400px) var(--mouse-y,-400px),
        rgba(240,120,40,0.04), transparent 70%);
    }

    /* ── LEFT HEADINGS ─────────────────────────────────── */
    .left-title {
      font-size: 1.6rem;
      font-weight: 200;
      color: var(--warm-white);
      letter-spacing: 0.02em;
      line-height: 1.1;
      margin-bottom: 0.6rem;
    }

    .left-desc {
      font-size: 0.84rem;
      font-weight: 300;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
    }

    /* ── TAG FILTER PILLS ──────────────────────────────── */
    .tag-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 2rem;
    }

    .tag-pill {
      background: none;
      border: 1px solid var(--navy-light);
      border-radius: 100px;
      color: var(--text-muted);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.25rem 0.75rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .tag-pill:hover {
      color: var(--text-bright);
      border-color: var(--text-muted);
    }
    .tag-pill.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--navy);
      font-weight: 600;
    }
    .tag-pill:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ── ARTICLE NAV ───────────────────────────────────── */
    .article-nav {
      flex: 1;
      overflow-y: auto;
    }

    .article-nav-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      opacity: 0.5;
      margin-bottom: 0.75rem;
    }

    .article-nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .article-nav-link {
      display: block;
      padding: 0.65rem 0 0.65rem 1rem;
      border-left: 2px solid var(--navy-light);
      text-decoration: none;
      transition: border-color 0.2s;
    }
    .article-nav-link:hover { border-left-color: var(--text-muted); }
    .article-nav-link.is-active { border-left-color: var(--accent); }
    .article-nav-link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Two-line clamped title */
    .article-nav-title {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 0.84rem;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.4;
      margin-bottom: 0.2rem;
      transition: color 0.2s;
    }
    .article-nav-link:hover .article-nav-title { color: var(--text-bright); }
    .article-nav-link.is-active .article-nav-title { color: var(--warm-white); }

    .article-nav-date {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      opacity: 0.5;
      transition: color 0.2s, opacity 0.2s;
    }
    .article-nav-link.is-active .article-nav-date {
      color: var(--accent);
      opacity: 1;
    }

    /* Hidden nav item (filtered out) */
    .article-nav-item.is-hidden { display: none; }

    /* ── LEFT FOOTER ───────────────────────────────────── */
    .left-footer {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding-top: 2rem;
      margin-top: 1rem;
      border-top: 1px solid var(--navy-light);
      flex-wrap: wrap;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .social-link:hover { color: var(--accent); }
    .social-link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 2px;
    }
    .social-link svg { width: 17px; height: 17px; display: block; }

    /* ── RIGHT PANEL ───────────────────────────────────── */
    .right-panel {
      padding: 4rem 5rem 8rem 5rem;
    }

    /* ── ARTICLE ───────────────────────────────────────── */
    .post-article {
      max-width: 680px;
      padding-bottom: 6rem;
    }

    .post-article + .post-article {
      padding-top: 6rem;
      border-top: 1px solid var(--navy-light);
    }

    /* Hidden article (filtered out) */
    .post-article.is-hidden { display: none; }

    /* ── ARTICLE HEADER ────────────────────────────────── */
    .post-meta-line {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .post-date {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .post-meta-sep {
      color: var(--navy-light);
      font-size: 0.8rem;
    }

    .post-read-time {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    .post-title {
      font-size: clamp(1.6rem, 3vw, 2.1rem);
      font-weight: 200;
      color: var(--warm-white);
      line-height: 1.2;
      letter-spacing: 0.01em;
      margin-bottom: 0.85rem;
    }

    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.75rem;
    }

    .post-tag {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-dim);
      border: 1px solid rgba(240, 120, 40, 0.3);
      border-radius: 2px;
      padding: 0.15rem 0.55rem;
      background: none;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .post-tag:hover {
      color: var(--accent);
      border-color: rgba(240, 120, 40, 0.6);
    }
    .post-tag.is-active {
      background: var(--accent);
      color: var(--navy);
      border-color: var(--accent);
      font-weight: 600;
    }
    .post-tag:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ── ARTICLE BODY ──────────────────────────────────── */
    .post-body {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--text-body);
      font-weight: 300;
    }

    .post-body p {
      margin-bottom: 1.5rem;
    }
    .post-body p:last-child { margin-bottom: 0; }

    .post-body h2 {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.02em;
      margin: 2.25rem 0 0.85rem;
    }

    .post-body h3 {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-bright);
      margin: 1.75rem 0 0.65rem;
    }

    .post-body ul,
    .post-body ol {
      padding-left: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .post-body li {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--text-body);
      font-weight: 300;
      margin-bottom: 0.4rem;
    }

    .post-body a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: var(--accent-dim);
      transition: color 0.2s, text-decoration-color 0.2s;
    }
    .post-body a:hover { color: var(--warm-white); text-decoration-color: var(--text-muted); }

    .post-body blockquote {
      border-left: 3px solid var(--accent-dim);
      padding-left: 1.25rem;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-style: italic;
    }

    .post-body code {
      font-family: 'Courier New', monospace;
      font-size: 0.875em;
      background: var(--navy-light);
      border-radius: 2px;
      padding: 0.1em 0.35em;
      color: var(--accent);
    }

    /* ── ARTICLE FOOTER (LinkedIn + Share) ─────────────── */
    .post-footer {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--navy-light);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .post-linkedin-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--text-muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .post-linkedin-link:hover { color: var(--text-bright); border-bottom-color: var(--text-muted); }
    .post-linkedin-link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 2px;
    }

    /* ── SHARE BUTTONS ─────────────────────────────────── */
    .post-share {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-left: auto;
    }

    .post-share-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-right: 0.2rem;
    }

    .post-share-btn {
      background: none;
      border: 1px solid var(--navy-light);
      border-radius: 2px;
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      padding: 0;
      flex-shrink: 0;
    }
    .post-share-btn:hover {
      color: var(--accent);
      border-color: var(--accent-dim);
      background: rgba(240, 120, 40, 0.08);
    }
    .post-share-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .post-share-btn svg { width: 13px; height: 13px; }
    .post-share-btn--copied {
      color: var(--accent) !important;
      border-color: var(--accent-dim) !important;
    }

    /* ── MASTODON FORM ─────────────────────────────────── */
    .post-mastodon-form {
      flex-basis: 100%;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    .post-mastodon-form[hidden] { display: none; }

    .post-mastodon-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .post-mastodon-input {
      flex: 1;
      min-width: 150px;
      background: var(--navy-mid);
      border: 1px solid var(--navy-light);
      border-radius: 2px;
      padding: 0.35rem 0.65rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--text-bright);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .post-mastodon-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(240, 120, 40, 0.15);
    }

    .post-mastodon-go {
      background: none;
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 0.35rem 0.85rem;
      border-radius: 2px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s;
    }
    .post-mastodon-go:hover { background: rgba(240, 120, 40, 0.1); border-color: var(--accent); }
    .post-mastodon-go:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .post-mastodon-cancel {
      background: none;
      border: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.35rem 0.1rem;
      transition: color 0.2s;
    }
    .post-mastodon-cancel:hover { color: var(--text-bright); }
    .post-mastodon-cancel:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }

    .post-share-notice {
      flex-basis: 100%;
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--accent);
      text-align: right;
      letter-spacing: 0.01em;
    }

    /* ── SCREEN READER ONLY ────────────────────────────── */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ── EMPTY STATE ───────────────────────────────────── */
    .no-results {
      padding: 4rem 0;
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.6;
    }

    /* ── REDUCED MOTION ────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      body::before { display: none; }
      .article-nav-link,
      .article-nav-title,
      .article-nav-date { transition: none; }
    }

    /* ── RESPONSIVE ────────────────────────────────────── */
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 280px 1fr; }
      .right-panel { padding: 4rem 3.5rem 8rem; }
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; max-width: 740px; }

      .left-panel {
        position: static;
        height: auto;
        padding: 3rem 2.5rem 2rem;
        border-right: none;
        border-bottom: 1px solid var(--navy-light);
      }

      /* On mobile show nav as horizontal scroll row */
      .article-nav-list {
        flex-direction: row;
        flex-wrap: nowrap;
        overflow-x: auto;
        gap: 0;
        padding-bottom: 0.5rem;
      }
      .article-nav-item { flex-shrink: 0; max-width: 180px; }
      .article-nav-link {
        border-left: none;
        border-bottom: 2px solid var(--navy-light);
        padding: 0.5rem 1rem 0.75rem 0;
      }
      .article-nav-link:hover { border-bottom-color: var(--text-muted); }
      .article-nav-link.is-active { border-bottom-color: var(--accent); }

      .right-panel { padding: 2.5rem 2.5rem 5rem; }
    }

    @media (max-width: 520px) {
      .left-panel  { padding: 2.5rem 1.5rem 2rem; }
      .right-panel { padding: 2rem 1.5rem 4rem; }
    }
  </style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WWV7W5D8"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="layout">

    <!-- ── LEFT PANEL ─────────────────────────────────── -->
    <aside class="left-panel" aria-label="Thinking navigation">

      <nav class="site-nav" aria-label="Site">
        <ul role="list">
          <li><a href="/"            class="site-nav-link">Home</a></li>
          <li><a href="/thinking/"   class="site-nav-link" aria-current="page">Thinking</a></li>
          <li><a href="/notes/"      class="site-nav-link">Notes</a></li>
          <li><a href="/experience/" class="site-nav-link">Experience</a></li>
        </ul>
        <button class="theme-toggle" aria-label="Switch to light mode" title="Switch to light mode">
          <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
               width="16" height="16">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
        </button>
      </nav>

      <h1 class="left-title">Thinking</h1>
      <p class="left-desc">Essays, observations, and ideas at the intersection of design, accessibility, and the future of building for humans.</p>

      <!-- Tag filter pills — populated by JS -->
      <div class="tag-filters" id="tag-filters" role="group" aria-label="Filter articles by topic"></div>

      <!-- Article index nav — populated by JS, scroll-spy active states -->
      <nav class="article-nav" aria-label="Article index">
        <p class="article-nav-label">Articles</p>
        <ul class="article-nav-list" id="article-nav-list" role="list"></ul>
      </nav>

      <footer class="left-footer">
        <a href="mailto:len@lenbeasley.com" class="social-link" aria-label="Email Len Beasley">
          <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m2 7 10 7 10-7"/>
          </svg>
        </a>
        <a href="https://www.linkedin.com/in/lenbeasley" target="_blank" rel="noopener"
           class="social-link" aria-label="LinkedIn profile (opens in new tab)">
          <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
            <rect x="2" y="9" width="4" height="12"/>
            <circle cx="4" cy="4" r="2"/>
          </svg>
        </a>
      </footer>
    </aside>

    <!-- ── RIGHT PANEL ────────────────────────────────── -->
    <main class="right-panel" id="main-content">
      <div id="posts-container" aria-label="All articles"></div>
    </main>

  </div>

  <!-- Screen-reader announcement for share feedback -->
  <div class="sr-only" id="share-announce" aria-live="polite" aria-atomic="true"></div>

  <!-- marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

  <script>
    'use strict';

    /* ── Spotlight cursor ──────────────────────────────── */
    (function () {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      document.addEventListener('mousemove', function (e) {
        document.documentElement.style.setProperty('--mouse-x', e.clientX + 'px');
        document.documentElement.style.setProperty('--mouse-y', e.clientY + 'px');
      });
    }());

    /* ── SVG icon strings ──────────────────────────────── */
    const ICONS = {
      linkedin: `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`,
      x:        `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,
      facebook: `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>`,
      link:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
      check:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><polyline points="20 6 9 17 4 12"/></svg>`,
      bluesky:  `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false"><path d="M12 10.8c-1.087-2.114-4.046-6.053-6.798-7.995C2.566.944 1.561 1.26.902 1.702c-.659.441-.919 1.489-.51 2.31C.849 4.946 3.205 8.555 5.197 9.99 2.935 9.357.602 8.98.168 11.575c-.17.998.449 2.045 1.33 2.37.799.296 1.714.11 2.478-.295C5.003 13.025 8.37 11.44 12 10.8zm0 0c1.087-2.114 4.046-6.053 6.798-7.995 2.636-1.861 3.641-1.545 4.3-1.103.659.441.919 1.489.51 2.31-.457.934-2.813 4.543-4.805 5.978 2.262-.633 4.595-1.01 5.029 1.585.17.998-.449 2.045-1.33 2.37-.799.296-1.714.11-2.478-.295C18.997 13.025 15.63 11.44 12 10.8z"/></svg>`,
      mastodon: `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false"><path d="M23.268 5.313c-.35-2.578-2.617-4.61-5.304-5.004C17.51.242 15.792 0 11.813 0h-.03c-3.98 0-4.835.242-5.288.309C3.882.692 1.496 2.518.917 5.127.64 6.412.61 7.837.661 9.143c.074 1.874.088 3.745.26 5.611.118 1.24.325 2.47.62 3.68.55 2.237 2.777 4.098 4.96 4.857 2.336.792 4.849.923 7.256.38.265-.061.527-.132.786-.213.585-.184 1.27-.39 1.774-.753a.057.057 0 0 0 .023-.043v-1.809a.052.052 0 0 0-.066-.054c1.517.363 3.072.546 4.632.546.376 0 .75 0 1.125-.01 1.57-.044 3.224-.124 4.768-.422.038-.008.077-.015.11-.024 2.435-.464 4.753-1.92 4.989-5.604.008-.145.03-1.52.03-1.67.002-.512.167-3.63-.024-5.545zm-3.748 9.195h-2.561V8.29c0-1.309-.55-1.976-1.67-1.976-1.23 0-1.846.79-1.846 2.35v3.403h-2.546V8.663c0-1.56-.617-2.35-1.848-2.35-1.112 0-1.668.668-1.67 1.977v6.218H4.822V8.102c0-1.31.337-2.35 1.011-3.12.696-.77 1.608-1.164 2.74-1.164 1.311 0 2.302.5 2.962 1.498l.638 1.06.638-1.06c.66-.999 1.65-1.498 2.96-1.498 1.13 0 2.043.395 2.74 1.164.675.77 1.012 1.81 1.012 3.12z"/></svg>`,
    };

    /* ── State ─────────────────────────────────────────── */
    let allPosts    = [];
    let activeTag   = null;
    const container    = document.getElementById('posts-container');
    const navList      = document.getElementById('article-nav-list');
    const tagFiltersEl = document.getElementById('tag-filters');
    const shareAnnounce = document.getElementById('share-announce');

    /* ── Helpers ───────────────────────────────────────── */
    function formatDate(str) {
      const d = new Date(str + 'T00:00:00');
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function readingTime(text) {
      const clean = (text || '').replace(/[#*`_~\[\]>]/g, '').replace(/<[^>]+>/g, '');
      const words = clean.trim().split(/\s+/).filter(Boolean).length;
      const mins  = Math.max(1, Math.ceil(words / 200));
      return mins === 1 ? '1 min read' : `${mins} min read`;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* ── Build tag filter pills ────────────────────────── */
    function buildTagFilters(posts) {
      const tagSet = new Set();
      posts.forEach(p => (p.tags || []).forEach(t => tagSet.add(t)));
      const tags = Array.from(tagSet).sort();
      if (!tags.length) return;

      // "All" pill
      const allBtn = document.createElement('button');
      allBtn.className = 'tag-pill is-active';
      allBtn.textContent = 'All';
      allBtn.setAttribute('aria-pressed', 'true');
      allBtn.addEventListener('click', () => applyTagFilter(null));
      tagFiltersEl.appendChild(allBtn);

      tags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'tag-pill';
        btn.textContent = tag;
        btn.setAttribute('aria-pressed', 'false');
        btn.addEventListener('click', () => applyTagFilter(tag));
        tagFiltersEl.appendChild(btn);
      });
    }

    /* ── Apply tag filter ──────────────────────────────── */
    function applyTagFilter(tag) {
      activeTag = tag;

      // Update pill states
      tagFiltersEl.querySelectorAll('.tag-pill').forEach(btn => {
        const isAll    = btn.textContent === 'All';
        const isActive = tag === null ? isAll : btn.textContent === tag;
        btn.classList.toggle('is-active', isActive);
        btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });

      // Show/hide articles and nav items
      container.querySelectorAll('.post-article').forEach(article => {
        const match = tag === null || (article.dataset.tags || '').split(',').includes(tag);
        article.classList.toggle('is-hidden', !match);
      });

      navList.querySelectorAll('.article-nav-item').forEach(item => {
        const match = tag === null || (item.dataset.tags || '').split(',').includes(tag);
        item.classList.toggle('is-hidden', !match);
      });
    }

    /* ── Build article nav ─────────────────────────────── */
    function buildArticleNav(posts) {
      navList.innerHTML = '';
      posts.forEach(post => {
        const li = document.createElement('li');
        li.className = 'article-nav-item';
        li.dataset.id   = post.id;
        li.dataset.tags = (post.tags || []).join(',');

        const a = document.createElement('a');
        a.className = 'article-nav-link';
        a.href = '#post-' + post.id;
        a.dataset.postId = post.id;
        a.innerHTML =
          `<span class="article-nav-title">${esc(post.title)}</span>` +
          `<span class="article-nav-date">${formatDate(post.date)}</span>`;

        li.appendChild(a);
        navList.appendChild(li);
      });
    }

    /* ── Render all articles, fully open ───────────────── */
    function renderArticles(posts) {
      container.innerHTML = '';

      if (!posts.length) {
        container.innerHTML = '<p class="no-results">No articles yet — check back soon.</p>';
        return;
      }

      posts.forEach(post => {
        const article = document.createElement('article');
        article.className = 'post-article';
        article.id = 'post-' + post.id;
        article.dataset.tags = (post.tags || []).join(',');

        const tags = (post.tags || [])
          .map(t => `<button class="post-tag" data-tag="${esc(t)}" aria-label="Filter by ${esc(t)}">${esc(t)}</button>`)
          .join('');

        const renderedContent = post.content
          ? marked.parse(post.content)
          : `<p>${esc(post.excerpt || '')}</p>`;

        const time = readingTime((post.content || '') + ' ' + (post.excerpt || ''));

        const linkedinLink = post.linkedinUrl
          ? `<a href="${esc(post.linkedinUrl)}" class="post-linkedin-link"
               target="_blank" rel="noopener noreferrer">Also on LinkedIn ↗</a>`
          : '';

        article.innerHTML = `
          <div class="post-meta-line">
            <time datetime="${esc(post.date)}" class="post-date">${formatDate(post.date)}</time>
            <span class="post-meta-sep" aria-hidden="true">·</span>
            <span class="post-read-time">${time}</span>
          </div>
          <h2 class="post-title">${esc(post.title)}</h2>
          ${tags ? `<div class="post-tags" aria-label="Tags">${tags}</div>` : ''}
          <div class="post-body">${renderedContent}</div>
          <footer class="post-footer">
            ${linkedinLink}
            <div class="post-share" aria-label="Share this article">
              <span class="post-share-label" aria-hidden="true">Share</span>
              <button class="post-share-btn" data-share="linkedin" aria-label="Share on LinkedIn">${ICONS.linkedin}</button>
              <button class="post-share-btn" data-share="x"        aria-label="Share on X">${ICONS.x}</button>
              <button class="post-share-btn" data-share="bluesky"  aria-label="Share on Bluesky">${ICONS.bluesky}</button>
              <button class="post-share-btn" data-share="mastodon" aria-label="Share on Mastodon" aria-expanded="false">${ICONS.mastodon}</button>
              <button class="post-share-btn" data-share="facebook" aria-label="Share on Facebook">${ICONS.facebook}</button>
              <button class="post-share-btn" data-share="copy"     aria-label="Copy link">${ICONS.link}</button>
            </div>
            <div class="post-mastodon-form" hidden role="group" aria-label="Share on Mastodon">
              <label class="post-mastodon-label" for="mastodon-${esc(post.id)}">Your instance</label>
              <input class="post-mastodon-input"
                     id="mastodon-${esc(post.id)}"
                     type="text" value="mastodon.social"
                     autocomplete="off" autocapitalize="none" spellcheck="false" />
              <button class="post-mastodon-go" type="button">Share ↗</button>
              <button class="post-mastodon-cancel" type="button">Cancel</button>
            </div>
            <span class="post-share-notice" hidden aria-hidden="true"></span>
          </footer>
        `;

        /* Tag buttons → filter */
        article.querySelectorAll('.post-tag').forEach(btn => {
          btn.addEventListener('click', () => {
            const tag = btn.getAttribute('data-tag');
            applyTagFilter(activeTag === tag ? null : tag);
          });
        });

        /* Share buttons */
        const postUrl = `https://lenbeasley.com/thinking/#post-${post.id}`;
        article.querySelectorAll('.post-share-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const type         = btn.getAttribute('data-share');
            const encoded      = encodeURIComponent(postUrl);
            const titleEncoded = encodeURIComponent(post.title);

            if (type === 'copy') {
              navigator.clipboard.writeText(postUrl).then(() => {
                btn.innerHTML = ICONS.check;
                btn.classList.add('post-share-btn--copied');
                btn.setAttribute('aria-label', 'Link copied!');
                shareAnnounce.textContent = 'Link copied to clipboard';
                setTimeout(() => {
                  btn.innerHTML = ICONS.link;
                  btn.classList.remove('post-share-btn--copied');
                  btn.setAttribute('aria-label', 'Copy link');
                  shareAnnounce.textContent = '';
                }, 2500);
              }).catch(() => {
                shareAnnounce.textContent = 'Unable to copy. URL: ' + postUrl;
              });

            } else if (type === 'mastodon') {
              const form   = btn.closest('.post-footer').querySelector('.post-mastodon-form');
              const isOpen = !form.hidden;
              form.hidden  = isOpen;
              btn.setAttribute('aria-expanded', !isOpen);
              if (!isOpen) form.querySelector('.post-mastodon-input').focus();

            } else {
              const caption = `"${post.title}" — ${postUrl}`;
              const notice  = btn.closest('.post-footer').querySelector('.post-share-notice');
              const urls = {
                linkedin: `https://www.linkedin.com/sharing/share-offsite/?url=${encoded}`,
                x:        `https://x.com/intent/post?url=${encoded}&text=${titleEncoded}`,
                bluesky:  `https://bsky.app/intent/compose?text=${encodeURIComponent(caption)}`,
                facebook: `https://www.facebook.com/sharer/sharer.php?u=${encoded}`,
              };

              if (type === 'linkedin' || type === 'facebook') {
                navigator.clipboard.writeText(caption).then(() => {
                  if (notice) {
                    notice.textContent = 'Caption copied — paste it into your post';
                    notice.hidden = false;
                    setTimeout(() => { notice.hidden = true; }, 4000);
                  }
                  shareAnnounce.textContent = 'Suggested caption copied. Paste it into your post.';
                  setTimeout(() => { shareAnnounce.textContent = ''; }, 4500);
                }).catch(() => {});
              }
              window.open(urls[type], '_blank', 'noopener,noreferrer,width=620,height=540');
            }
          });
        });

        /* Mastodon form */
        const mForm   = article.querySelector('.post-mastodon-form');
        const mInput  = mForm.querySelector('.post-mastodon-input');
        const mGo     = mForm.querySelector('.post-mastodon-go');
        const mCancel = mForm.querySelector('.post-mastodon-cancel');
        const mBtn    = article.querySelector('[data-share="mastodon"]');

        function doMastodon() {
          const raw = mInput.value.trim().replace(/^https?:\/\//, '').replace(/\/$/, '');
          if (!raw) { mInput.focus(); return; }
          const caption  = `"${post.title}" — ${postUrl}`;
          const shareUrl = `https://${raw}/share?text=${encodeURIComponent(caption)}`;
          window.open(shareUrl, '_blank', 'noopener,noreferrer,width=620,height=540');
          mForm.hidden = true;
          mBtn.setAttribute('aria-expanded', 'false');
        }

        mGo.addEventListener('click', doMastodon);
        mInput.addEventListener('keydown', e => { if (e.key === 'Enter') doMastodon(); });
        mCancel.addEventListener('click', () => {
          mForm.hidden = true;
          mBtn.setAttribute('aria-expanded', 'false');
          mBtn.focus();
        });

        container.appendChild(article);
      });
    }

    /* ── Scroll-spy: highlight nav link for visible article */
    function initScrollSpy() {
      const articles = container.querySelectorAll('.post-article');
      const navLinks = navList.querySelectorAll('.article-nav-link');

      function setActive(id) {
        navLinks.forEach(link => {
          const active = link.dataset.postId === id;
          link.classList.toggle('is-active', active);
          link.setAttribute('aria-current', active ? 'true' : 'false');
        });
      }

      const obs = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            setActive(entry.target.id.replace('post-', ''));
          }
        });
      }, { threshold: 0.2 });

      articles.forEach(a => obs.observe(a));
      if (articles.length) setActive(articles[0].id.replace('post-', ''));
    }

    /* ── Frontmatter parser ─────────────────────────────── */
    function parseFrontmatter(text, slug) {
      const match = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
      if (!match) return { id: slug, title: slug, date: '', tags: [], excerpt: '', linkedinUrl: null, content: text };
      const meta = {};
      match[1].split(/\r?\n/).forEach(line => {
        const i = line.indexOf(':');
        if (i === -1) return;
        meta[line.slice(0, i).trim()] = line.slice(i + 1).trim();
      });
      return {
        id:          slug,
        title:       meta.title       || slug,
        date:        meta.date        || '',
        tags:        meta.tags        ? meta.tags.split(',').map(t => t.trim()).filter(Boolean) : [],
        excerpt:     meta.excerpt     || '',
        linkedinUrl: meta.linkedinUrl || null,
        content:     match[2].trim()
      };
    }

    /* ── Bootstrap ─────────────────────────────────────── */
    fetch('/thinking/index.json')
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(slugs => Promise.all(
        slugs.map(slug =>
          fetch(`/thinking/${slug}.md`)
            .then(r => {
              if (!r.ok) throw new Error('HTTP ' + r.status);
              return r.text();
            })
            .then(text => parseFrontmatter(text, slug))
        )
      ))
      .then(posts => {
        allPosts = posts.sort((a, b) => new Date(b.date) - new Date(a.date));

        buildTagFilters(allPosts);
        buildArticleNav(allPosts);
        renderArticles(allPosts);
        initScrollSpy();

        // Hash routing: scroll to the linked article on load
        const hash = window.location.hash;
        if (hash && hash.startsWith('#post-')) {
          const target = document.getElementById(hash.slice(1));
          if (target) {
            (document.fonts ? document.fonts.ready : Promise.resolve()).then(() => {
              setTimeout(() => {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
              }, 50);
            });
          }
        }
      })
      .catch(err => {
        console.error('Failed to load posts:', err);
        container.innerHTML =
          '<p class="no-results">Articles couldn\'t load right now. Please refresh to try again.</p>';
      });

  /* ── THEME TOGGLE ─────────────────────────────────── */
  (function () {
    const btn = document.querySelector('.theme-toggle');
    if (!btn) return;

    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      btn.setAttribute('aria-label', theme === 'light' ? 'Switch to dark mode' : 'Switch to light mode');
      btn.title = theme === 'light' ? 'Switch to dark mode' : 'Switch to light mode';
    }

    // Priority: stored preference > system preference > dark
    const stored = localStorage.getItem('lb-theme');
    const systemLight = window.matchMedia('(prefers-color-scheme: light)');
    applyTheme(stored || (systemLight.matches ? 'light' : 'dark'));

    // Follow system changes live only when the user hasn't set a manual preference
    systemLight.addEventListener('change', function (e) {
      if (!localStorage.getItem('lb-theme')) applyTheme(e.matches ? 'light' : 'dark');
    });

    // Manual toggle stores the choice and overrides system preference
    btn.addEventListener('click', function () {
      const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
      localStorage.setItem('lb-theme', next);
      applyTheme(next);
    });
  })();

  </script>
